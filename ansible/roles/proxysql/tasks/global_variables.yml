# Any changes here means ProxySQL must be restarted
# https://github.com/sysown/proxysql/wiki/Global-variables

# A fresh ProxySQL ships with admin:admin. Rotate the admin password to the
# vaulted value using the default login. On a re-run the default no longer
# works (already rotated), so this is ignored and the later tasks use the
# vaulted password.
- name: Rotate the ProxySQL admin password to the vaulted value
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "admin"
    variable: "admin-admin_credentials"
    value: "admin:{{ proxysql_admin_password }}"
    save_to_disk: true
    load_to_runtime: true
  failed_when: false
  changed_when: false

- name: Set interfaces
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-interfaces"
    value: "0.0.0.0:3306;/var/lib/proxysql/proxysql.sock"
    # mysql-interfaces only applies at startup, so it must be on disk before
    # the restart handler runs — otherwise the restart reloads the default.
    save_to_disk: true
  notify:
    - Restart proxysql

- name: Set desired number of threads (should match number of CPUs)
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-threads"
    value: "2"
  notify:
    - Restart proxysql

- name: Set max connections
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-max_connections"
    value: "1000"
  notify:
    - Restart proxysql

- name: Set the slow query log threshold (ms)
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-long_query_time"
    value: "1000"
  notify:
    - Restart proxysql

- name: Set monitor username
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-monitor_username"
    value: "proxymonitor"
  notify:
    - Restart proxysql

- name: Set monitor password
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-monitor_password"
    value: "{{ proxysql_monitor_password }}"
  notify:
    - Restart proxysql

- name: Set the monitor connect interval to 30s
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-monitor_connect_interval"
    value: "30000"
  notify:
    - Restart proxysql

# Logging stuff
# https://github.com/sysown/proxysql/wiki/Query-Logging

- name: Log file name
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-eventslog_filename"
    value: "queries.log"
  notify:
    - Restart proxysql

- name: Set logging format to JSON
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-eventslog_format"
    value: "2"
  notify:
    - Restart proxysql

- name: Enable logging globally
  community.proxysql.proxysql_global_variables:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    variable: "mysql-eventslog_default_log"
    value: "1"
  notify:
    - Restart proxysql

- name: Rules to log ALL queries
  community.proxysql.proxysql_query_rules:
    login_user: "admin"
    login_password: "{{ proxysql_admin_password }}"
    apply: no
    active: 1
    state: present
    rule_id: "1"
    match_digest: "."
    log: "1"
    load_to_runtime: True
