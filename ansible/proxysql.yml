---
# This playbook will set up an EC2 instance with a tag of Name = proxysql
# It will install Proxysql with a hostgroup, host and user created by other steps in this project
- hosts: all

  gather_facts: no

  become: yes

  user: ubuntu

  vars:
    # proxysql_admin_password and proxysql_monitor_password come from
    # group_vars/all (backed by Ansible Vault) — see group_vars/all/vault.yml.example
    # look up the RDS instance details from AWS Secrets Manager
    rds_details: "{{ lookup('amazon.aws.aws_secret', 'rds') }}"

  roles:
    - proxysql
