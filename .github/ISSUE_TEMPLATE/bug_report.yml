name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Running `make up` failed with ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The commands you ran, in order.
      render: shell
    validations:
      required: false
  - type: input
    id: tf-version
    attributes:
      label: Terraform / OpenTofu version
      placeholder: terraform 1.10.5
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      render: shell
    validations:
      required: false
