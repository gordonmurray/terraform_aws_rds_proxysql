name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: terraform validate
        run: terraform -chdir=terraform validate

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install ansible-lint and the collections
        run: |
          pip install ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml

      # Non-blocking for now — surfaces findings without gating merges.
      - name: ansible-lint
        run: ansible-lint
        working-directory: ansible
        continue-on-error: true

  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: terraform-linters/setup-tflint@v6.3.0
        with:
          tflint_version: latest

      - name: tflint --init
        run: tflint --init
        working-directory: terraform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Non-blocking for now — surfaces findings without gating merges.
      # #22 will fold tflint into the required quality gate.
      - name: tflint
        run: tflint --format compact
        working-directory: terraform
        continue-on-error: true
