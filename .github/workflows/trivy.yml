# Scans the Terraform (and other IaC) for misconfigurations with Trivy,
# which absorbed tfsec, and uploads the results to GitHub code scanning.
name: trivy-config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 4"

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Clone repo
        uses: actions/checkout@v7

      - name: Run Trivy config scan
        # Pinned to a commit SHA — trivy-action tags were tampered with in early 2026.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
